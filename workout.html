<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workouts | FitTrack Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="workout.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>FitTrack</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="workout.html" class="active">Workouts</a>
  <a href="goals.html">Goals</a>
  <a href="reminders.html">Reminders</a>
  <a href="about.html">About</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar fade-in" style="animation-delay: 0.1s;">
    <span id="menuBtn">☰</span>
    <h2>Workout Tracker 💪</h2>
  </div>

  <!-- BG ORBS -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- WORKOUT DASHBOARD GRID -->
  <div class="workout-grid">
    
    <!-- LEFT PANEL: HERO & FORM -->
    <div class="workout-left fade-in" style="animation-delay: 0.2s;">
      
      <!-- HERO CARD -->
      <div class="card hero-card">
        <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=600&auto=format&fit=crop" alt="Workout" class="hero-img">
        <div class="hero-text-overlay">
          <h3>Push Your Limits</h3>
          <p>Consistency is the key to progress.</p>
        </div>
      </div>

      <!-- ADD WORKOUT CARD -->
      <div class="card form-card">
        <h3 style="margin-bottom: 12px; color: #e2e8f0;">🏋️ Log Activity</h3>
        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 15px;">Track your session and hit your goals.</p>
        
        <select id="workoutSelect" class="input flex-input" onchange="toggleCustomWorkout()">
          <option value="Pushups">Pushups</option>
          <option value="Running">Running</option>
          <option value="Cycling">Cycling</option>
          <option value="Weightlifting">Weightlifting</option>
          <option value="Yoga">Yoga</option>
          <option value="Swimming">Swimming</option>
          <option value="Squats">Squats</option>
          <option value="Deadlifts">Deadlifts</option>
          <option value="Other">Other (Custom)</option>
        </select>
        
        <input type="text" id="workoutInput" class="input flex-input" placeholder="Type custom activity..." style="display:none; margin-top:12px;">
        
        <button class="btn" style="width: 100%; margin-top: 15px;" onclick="addWorkout()">+ Add Activity</button>
      </div>

    </div>

    <!-- RIGHT PANEL: WORKOUT LIST -->
    <div class="workout-right fade-in" style="animation-delay: 0.3s;">
      <div class="card list-card">
        <div class="list-header">
          <h3 style="color: #cbd5f5;">Workouts Completed</h3>
          <span class="badge" id="workoutCountBadge">0 sessions</span>
        </div>
        
        <ul id="workoutList" class="premium-list">
          <!-- Rendered via JS -->
        </ul>

        <!-- EMPTY STATE -->
        <div id="emptyState" class="empty-state">
           <p>No activities yet. Let's get moving! 💪</p>
        </div>
      </div>
    </div>

  </div> <!-- End Grid -->
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="workout.js"></script>
</body>
</html>
