<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | FitTrack Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="global.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>FitTrack</h2>
  <a href="dashboard.html" class="active">Dashboard</a>
  <a href="workout.html">Workouts</a>
  <a href="goals.html">Goals</a>
  <a href="reminders.html">Reminders</a>
  <a href="about.html">About</a>
  <a href="index.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- NAVBAR -->
  <div class="topbar">
    <span id="menuBtn">☰</span>
    <h3 id="welcomeText">Welcome</h3>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Workouts</h3>
      <p id="workoutCount">0</p>
    </div>

    <div class="card">
      <h3>Goals</h3>
      <p id="goalCount">0</p>
    </div>

    <div class="card">
      <h3>Reminders</h3>
      <p>Active</p>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="goTo('workout.html')">Add Workout</button>
    <button onclick="goTo('goals.html')">Set Goal</button>
    <button onclick="goTo('reminders.html')">Set Reminder</button>
  </div>

  <!-- ACTIVITY -->
  <div class="activity">
    <h3>Recent Activity</h3>
    <ul id="activityList"></ul>
  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
