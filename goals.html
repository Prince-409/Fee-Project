<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals | FitTrack Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="goals.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>FitTrack</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="workout.html">Workouts</a>
  <a href="goals.html" class="active">Goals</a>
  <a href="reminders.html">Reminders</a>
  <a href="about.html">About</a>
  <a href="index.html" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar fade-in" style="animation-delay: 0.1s;">
    <span id="menuBtn">☰</span>
    <h2>Goal Tracker 🎯</h2>
  </div>

  <!-- BG ORBS -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- GOALS DASHBOARD GRID -->
  <div class="goals-grid">
    
    <!-- LEFT PANEL: PROGRESS & FORM -->
    <div class="goals-left fade-in" style="animation-delay: 0.2s;">
      
      <!-- HERO & PROGRESS -->
      <div class="card hero-card">
        <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?q=80&w=600&auto=format&fit=crop" alt="Target Board" class="hero-img">
        <div class="progress-section">
          <h3>Your Momentum</h3>
          <div class="progress-bar-container">
            <div class="progress-bar" id="goalProgressBar"></div>
          </div>
          <p id="progressText" class="progress-text">0 / 0 Completed</p>
        </div>
      </div>

      <!-- ADD GOAL CARD -->
      <div class="card form-card">
        <h3 style="margin-bottom: 12px; color: #e2e8f0;">✨ Create Habit</h3>
        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 15px;">Set your target and stay committed.</p>
        
        <select id="goalSelect" class="input flex-input" onchange="toggleCustomGoal()">
          <option value="Lose 5kg">Lose 5kg</option>
          <option value="Gain Muscle Mass">Gain Muscle Mass</option>
          <option value="Run a Half Marathon">Run a Half Marathon</option>
          <option value="Drink 3L Water Daily">Drink 3L Water Daily</option>
          <option value="Sleep 8 Hours Daily">Sleep 8 Hours Daily</option>
          <option value="Workout 5 Days a Week">Workout 5 Days a Week</option>
          <option value="Other">Other (Custom Goal)</option>
        </select>
        
        <input type="text" id="goalInput" class="input flex-input" placeholder="Type custom goal..." style="display:none; margin-top:12px;">
        
        <button class="btn" style="width: 100%; margin-top: 15px;" onclick="addGoal()">+ Add Goal</button>
      </div>

    </div>

    <!-- RIGHT PANEL: GOAL LIST -->
    <div class="goals-right fade-in" style="animation-delay: 0.3s;">
      <div class="card list-card">
        <div class="list-header">
          <h3 style="color: #cbd5f5;">Active Targets</h3>
          <span class="badge" id="activeGoalsBadge">0 Goals</span>
        </div>
        <ul id="goalList" class="premium-list">
          <!-- Rendered via JS -->
        </ul>
      </div>
    </div>

  </div> <!-- End Grid -->
</div>

<script src="goals.js"></script>
</body>
</html>
