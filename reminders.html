<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reminders | FitTrack Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="reminders.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>FitTrack</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="workout.html">Workouts</a>
  <a href="goals.html">Goals</a>
  <a href="reminders.html" class="active">Reminders</a>
  <a href="about.html">About</a>
  <a href="index.html" id="logoutBtn">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar fade-in" style="animation-delay: 0.1s;">
    <span id="menuBtn">☰</span>
    <h2>Reminders ⏰</h2>
  </div>

  <!-- BG ORBS -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <!-- REMINDERS DASHBOARD GRID -->
  <div class="reminders-grid">
    
    <!-- LEFT PANEL: HERO & FORM -->
    <div class="reminders-left fade-in" style="animation-delay: 0.2s;">
      
      <!-- HERO CARD -->
      <div class="card hero-card">
        <img src="https://images.unsplash.com/photo-1508962942661-f79b20ba2dca?q=80&w=600&auto=format&fit=crop" alt="Time" class="hero-img">
        <div class="hero-text-overlay">
          <h3>Stay on Track</h3>
          <p>Time management is the secret to success.</p>
        </div>
      </div>

      <!-- ADD REMINDER CARD -->
      <div class="card form-card">
        <h3 style="margin-bottom: 12px; color: #e2e8f0;">🔔 Set Alert</h3>
        <p style="font-size: 13px; color: #94a3b8; margin-bottom: 15px;">Never miss a training session.</p>
        
        <input type="text" id="reminderText" class="input" placeholder="Workout reminder (e.g. Legs Day!)" style="margin-bottom: 15px;">

        <div class="time-inputs-container">
          <div class="time-box">
             <label>Hours</label>
             <input type="number" id="hours" class="input" placeholder="00" min="0">
          </div>
          <div class="time-box">
             <label>Minutes</label>
             <input type="number" id="minutes" class="input" placeholder="00" min="0" max="59">
          </div>
          <div class="time-box">
             <label>Seconds</label>
             <input type="number" id="seconds" class="input" placeholder="00" min="0" max="59">
          </div>
        </div>
        
        <button class="btn" style="width: 100%; margin-top: 20px;" onclick="addReminder()">Set Reminder</button>
      </div>

    </div>

    <!-- RIGHT PANEL: REMINDER LIST -->
    <div class="reminders-right fade-in" style="animation-delay: 0.3s;">
      <div class="card list-card">
        <div class="list-header">
          <h3 style="color: #cbd5f5;">Upcoming Alerts</h3>
          <span class="badge" id="reminderCountBadge">0 alerts</span>
        </div>
        
        <ul id="reminderList" class="premium-list">
          <!-- Rendered via JS -->
        </ul>

         <!-- EMPTY STATE -->
        <div id="reminderEmptyState" class="empty-state">
           <p>All clear! No reminders set. 🧘</p>
        </div>
      </div>
    </div>

  </div> <!-- End Grid -->
</div>

<!-- AUDIO -->
<audio id="ringtone" src="reminder.mp3"></audio>

<script src="reminders.js"></script>
</body>
</html>
