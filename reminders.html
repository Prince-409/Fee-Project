<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reminders | FitTrack Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reminders.css">
  <link rel="stylesheet" href="global.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>FitTrack</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="workout.html">Workouts</a>
  <a href="goals.html">Goals</a>
  <a href="reminders.html" class="active">Reminders</a>
  <a href="about.html">About</a>
  <a href="index.html">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="topbar">
    <span id="menuBtn">☰</span>
    <h2>Reminders ⏰</h2>
  </div>

  <!-- FORM -->
  <div class="form">
  <input type="text" id="reminderText" placeholder="Workout reminder">

  <div class="time-inputs">
    <input type="number" id="hours" placeholder="HH">
    <input type="number" id="minutes" placeholder="MM">
    <input type="number" id="seconds" placeholder="SS">
  </div>

  <button onclick="addReminder()">Set Reminder</button>
</div>

<!-- AUDIO -->
<audio id="ringtone" src="reminder.mp3"></audio>

  <!-- LIST -->
  <div class="list">
    <h3>Active Reminders</h3>
    <ul id="reminderList"></ul>
  </div>

</div>

<script src="reminders.js"></script>
</body>
</html>
